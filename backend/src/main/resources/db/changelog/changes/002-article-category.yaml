databaseChangeLog:
  - changeSet:
      id: 002-create-article-category
      author: Yahn
      changes:
        - createSequence:
            sequenceName: article_category_seq

        - createTable:
            tableName: article_category
            columns:
              - column:
                  name: id
                  type: BIGINT
                  defaultValueSequenceNext: article_category_seq
                  constraints:
                    primaryKey: true
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: created_at
                  type: TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
