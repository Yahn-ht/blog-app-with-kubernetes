databaseChangeLog:
  - changeSet:
      id: 003-create-articles
      author: Yahn
      changes:
        - createSequence:
            sequenceName: article_seq

        - createTable:
            tableName: article
            columns:
              - column:
                  name: id
                  type: BIGINT
                  defaultValueSequenceNext: article_seq
                  constraints:
                    primaryKey: true
              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: slug
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: content
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: like_count
                  type: INTEGER
              - column:
                  name: published_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: author_id
                  type: BIGINT
              - column:
                  name: category_id
                  type: BIGINT
              - column:
                  name: created_at
                  type: TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP

        - addForeignKeyConstraint:
            baseTableName: article
            baseColumnNames: author_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_article_user

        - addForeignKeyConstraint:
            baseTableName: article
            baseColumnNames: category_id
            referencedTableName: article_category
            referencedColumnNames: id
            constraintName: fk_article_category
