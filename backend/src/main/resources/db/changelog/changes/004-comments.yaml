databaseChangeLog:
  - changeSet:
      id: 004-create-comments
      author: Yahn
      changes:
        - createSequence:
            sequenceName: comment_seq

        - createTable:
            tableName: comment
            columns:
              - column:
                  name: id
                  type: BIGINT
                  defaultValueSequenceNext: comment_seq
                  constraints:
                    primaryKey: true
              - column:
                  name: content
                  type: TEXT
              - column:
                  name: user_id
                  type: BIGINT
              - column:
                  name: article_id
                  type: BIGINT
              - column:
                  name: created_at
                  type: TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP

        - addForeignKeyConstraint:
            baseTableName: comment
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_comment_user

        - addForeignKeyConstraint:
            baseTableName: comment
            baseColumnNames: article_id
            referencedTableName: article
            referencedColumnNames: id
            constraintName: fk_comment_article
