apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-Deployment
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
    app: frontend
  template:
    metadata:
      name: frontend
      labels: 
        app: frontend
    spec:
      containers:
      - name: frontend-container
        image: yahnht/frontend:latest
        ports:
        - containerPort: 3000
     